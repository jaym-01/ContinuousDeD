## The following configuration parameters are for hyperparameter optimization of the D- and R- Networks
## The objective of the optimization is to maximize the average AUC of the IQN-based models
data_dir: "/ais/bulbasaur/twkillian/AHE_Sepsis_Data/rectilinear_processed/"
output_dir: "/ais/bulbasaur/twkillian/UncDeD_Results/IQN/"
output_fname: "best_dqn_cql_model.pt"
architecture: 'dqn'
total_trials: 1
seed: 2022
train_batch_size: 64
num_ps: 0
num_ns: 2
parameterization: [
        {"name": "seed", "type": "fixed", "value": 0},
        {"name": "num_actions", "type": "fixed", "value": 25},
        {"name": "gamma", "type": "fixed", "value": 1.0},
        {"name": "distortion_risk_measure", "type": "fixed", "value": "identity"},
        {"name": "q_update_freq", "type": "fixed", "value": 5},
        {"name": "use_cql", "type": "fixed", "value": True},
        # {"name": "cql_weight", "type": "range", "bounds": [0.01, 0.25]},
        {"name": "cql_weight", "type": "fixed", "value": 0.10},
        # {"name": "num_q_hidden_units", "type": "choice", "values": [16, 32, 64]},
        {"name": "num_q_hidden_units", "type": "fixed", "value": 32},
        # {"name": "num_q_layers", "type": "choice", "values": [1, 2]},
        {"name": "num_q_layers", "type": "fixed", "value": 2},
        # {"name": "lr", "type": "range", "bounds": [0.00001, 0.0005], "log_scale": True},
        {"name": "lr", "type": "fixed", "value": 0.00007825},
        # {"name": "num_training_epochs", "type": "choice", "values": [50, 75, 100]},
        {"name": "num_training_epochs", "type": "fixed", "value": 50},]